<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Feliz Cumpleaños</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:ital,wght@1,700&display=swap');
:root {
            --bg-dark: #0b0c10;
            --cake-base: linear-gradient(to right, #1a1a24, #2b2b3c);
            --cake-mid: linear-gradient(to right, #242536, #363753);
            --cake-top: linear-gradient(to right, #2e2f47, #414266);
            --gold: #d4af37;
            --text-main: #c5c6c7;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #0b0c10;
            font-family: 'Montserrat', sans-serif;
            touch-action: none; user-select: none;
            color: #fff;
        }

        /* Lienzos para efectos */
        #bg-canvas, #fx-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        }
        #bg-canvas { z-index: 1; opacity: 0.5; }
        #fx-canvas { z-index: 100; }

        .ui-layer {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10;
        }

        h1 {
            font-family: 'Playfair Display', serif; color: var(--gold);
            font-size: 2.8rem; text-align: center; padding: 0 20px;
            margin-bottom: 10px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            transition: opacity 1s; opacity: 0;
        }
        
        .hint {
            color: var(--text-main); font-size: 0.9rem; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 40px;
            animation: pulse 2s infinite; opacity: 0; transition: opacity 1s;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* --- BOTÓN DE INICIO --- */
        #start-btn {
            padding: 15px 40px; background: transparent; border: 2px solid var(--gold);
            color: var(--gold); font-family: 'Montserrat', sans-serif; font-weight: bold;
            font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase;
            border-radius: 5px; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); z-index: 50;
        }
        #start-btn:hover { background: var(--gold); color: #0b0c10; box-shadow: 0 0 30px rgba(212, 175, 55, 0.6); }

        /* --- TORTA --- */
        .cake-container {
            position: relative; display: flex; flex-direction: column; align-items: center;
            opacity: 0; transform: scale(0.8) translateY(50px); transition: all 1.5s ease;
            pointer-events: none;
        }
        .cake-container.active { opacity: 1; transform: scale(1) translateY(0); }
        .cake-container.hide { opacity: 0; transform: scale(0.5) translateY(200px); }

        .tier { position: relative; border-radius: 8px 8px 0 0; box-shadow: inset -10px 0 20px rgba(0,0,0,0.5), 0 10px 15px rgba(0,0,0,0.3); }
        .tier::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 12px;
            background: var(--gold); border-radius: 8px 8px 10px 10px; z-index: 2;
        }
        .drips {
            position: absolute; top: 10px; left: 0; right: 0; height: 20px;
            background: radial-gradient(circle at 15px 0, transparent 15px, var(--gold) 16px);
            background-size: 30px 25px; z-index: 1;
        }
        .tier-top { width: 140px; height: 60px; background: var(--cake-top); z-index: 3; }
        .tier-mid { width: 200px; height: 70px; background: var(--cake-mid); z-index: 2; }
        .tier-base { width: 260px; height: 80px; background: var(--cake-base); z-index: 1; border-radius: 8px; }
        .plate {
            width: 320px; height: 20px; background: #22223b; border-radius: 50%; margin-top: -10px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.8); z-index: 0; border: 2px solid #5a5f80;
        }

        /* --- VELA --- */
        .candle {
            position: absolute; top: -65px; left: 50%; transform: translateX(-50%);
            width: 14px; height: 65px; background: repeating-linear-gradient(-45deg, #222, #222 5px, #111 5px, #111 10px);
            border-radius: 3px; z-index: 4; border: 1px solid #000;
        }
        .wick { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 20px; height: 30px; }
        .wick-line { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 3px; height: 15px; background: #555; }
        
        .flame {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 35px; background: #ffea00;
            border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
            box-shadow: 0 0 20px #ffea00, 0 0 50px #ff9100;
            opacity: 0; transition: opacity 0.3s; cursor: pointer; transform-origin: bottom center; pointer-events: none;
        }
        .flame.lit { opacity: 1; pointer-events: auto; animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1) rotate(-1deg); } 100% { transform: translateX(-50%) scale(1.05) rotate(1deg); } }

        /* --- CAJA DE REGALO ÉLITE --- */
        .gift-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 150px; height: 150px; opacity: 0; transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; z-index: 20; display: none;
        }
        .gift-container.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); animation: floatBox 3s ease-in-out infinite; }
        @keyframes floatBox { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -60px) scale(1); } }
        
        .box { width: 100%; height: 100%; background: #1a1a24; border: 2px solid var(--gold); border-radius: 5px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .ribbon-v { position: absolute; left: 50%; transform: translateX(-50%); width: 20px; height: 100%; background: var(--gold); }
        .ribbon-h { position: absolute; top: 50%; transform: translateY(-50%); width: 100%; height: 20px; background: var(--gold); }
        .bow { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 60px; height: 30px; background: var(--gold); clip-path: polygon(0 0, 100% 0, 80% 50%, 100% 100%, 0 100%, 20% 50%); }

        /* --- TARJETA --- */
        .card-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none; perspective: 1000px; z-index: 50; }
        .card {
            width: 85%; max-width: 450px; padding: 50px 30px; background: rgba(11, 12, 16, 0.85); backdrop-filter: blur(15px);
            border: 1px solid var(--gold); border-radius: 15px; box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(212, 175, 55, 0.15);
            text-align: center; opacity: 0; transform: translateY(50px) rotateX(10deg); transition: all 1s; pointer-events: none;
        }
        .card.show { opacity: 1; transform: translateY(0) rotateX(0); pointer-events: auto; }
        .card h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.8rem; margin: 0 0 20px 0; font-style: italic; }
        .card p { color: var(--text-main); font-size: 1.1rem; line-height: 1.8; font-weight: 400; }
        .card strong { color: #fff; font-weight: 700; letter-spacing: 1px;}
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=smooth-waters-115977.mp3" type="audio/mpeg">
    </audio>

    <canvas id="bg-canvas"></canvas>
    <canvas id="fx-canvas"></canvas>

    <div class="ui-layer" id="ui-layer">
        <button id="start-btn" onclick="startExperience()">Iniciar Experiencia</button>
        
        <h1 id="title"></h1>
        <div class="hint" id="hint"></div>
        
        <div class="cake-container" id="cake">
            <div class="candle">
                <div class="wick" id="wick"><div class="wick-line"></div></div>
                <div class="flame" id="flame"></div>
            </div>
            <div class="tier tier-top"><div class="drips"></div></div>
            <div class="tier tier-mid"><div class="drips"></div></div>
            <div class="tier tier-base"><div class="drips"></div></div>
            <div class="plate"></div>
        </div>

        <div class="gift-container" id="gift" onclick="openGift()">
            <div class="bow"></div>
            <div class="box">
                <div class="ribbon-v"></div>
                <div class="ribbon-h"></div>
            </div>
        </div>
    </div>

    <div class="card-container">
        <div class="card" id="card">
            <h2>¡Feliz Cumpleaños!</h2>
            <p>Feliz Cumpleaños poste de luz!! Que lo pases bonito en tu dia </p>
            <p><strong>Brindemos que cada dia estas mas cerca del asilo 🥂</strong></p>
        </div>
    </div>

    <script>
        // --- ESTADOS Y VARIABLES ---
        let phase = -1; // -1: Inicio, 0: Oscuro, 1: Vela Encendida, 2: Regalo, 3: Tarjeta
        let taps = 0;
        
        const title = document.getElementById('title');
        const hint = document.getElementById('hint');
        const cake = document.getElementById('cake');
        const flame = document.getElementById('flame');
        const wick = document.getElementById('wick');
        const gift = document.getElementById('gift');
        const card = document.getElementById('card');
        const bgMusic = document.getElementById('bg-music');

        // --- MOTOR DE EFECTOS DE SONIDO (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSpark() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(1500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(3000, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function playBlow() {
            const bufferSize = audioCtx.sampleRate * 0.5; // Medio segundo de ruido blanco
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 1000;
            const gain = audioCtx.createGain();
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            noise.start();
        }

        function playPop() {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        // --- SISTEMA GRÁFICO (CANVAS) ---
        const fxCanvas = document.getElementById('fx-canvas'); const fxCtx = fxCanvas.getContext('2d');
        const bgCanvas = document.getElementById('bg-canvas'); const bgCtx = bgCanvas.getContext('2d');
        let particles = []; let stars = [];

        function resize() {
            fxCanvas.width = bgCanvas.width = window.innerWidth;
            fxCanvas.height = bgCanvas.height = window.innerHeight;
            initStars();
        }
        window.addEventListener('resize', resize);
        
        function initStars() {
            stars = [];
            for(let i=0; i<100; i++) {
                stars.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, size: Math.random() * 1.5, speed: Math.random() * 0.5 + 0.1 });
            }
        }

        class Spark {
            constructor(x, y) {
                this.x = x; this.y = y; this.size = Math.random() * 3 + 1;
                this.vx = Math.random() * 2 - 1; this.vy = Math.random() * 2 - 1; this.life = 1;
            }
            update() { this.x+=this.vx; this.y+=this.vy; this.life-=0.05; }
            draw() { fxCtx.fillStyle=`rgba(212, 175, 55, ${this.life})`; fxCtx.beginPath(); fxCtx.arc(this.x, this.y, this.size, 0, Math.PI*2); fxCtx.fill(); }
        }

        class Confetti {
            constructor() {
                this.x = window.innerWidth / 2; this.y = window.innerHeight / 2;
                this.size = Math.random() * 8 + 4;
                const angle = Math.random() * Math.PI * 2; const velocity = Math.random() * 20 + 5;
                this.vx = Math.cos(angle) * velocity; this.vy = Math.sin(angle) * velocity - 10;
                this.color = ['#d4af37', '#c0c0c0', '#fff'][Math.floor(Math.random() * 3)];
                this.rot = Math.random() * 360; this.rotSpeed = Math.random() * 10 - 5;
            }
            update() { this.vx*=0.96; this.vy+=0.4; this.x+=this.vx; this.y+=this.vy; this.rot+=this.rotSpeed; }
            draw() {
                fxCtx.save(); fxCtx.translate(this.x, this.y); fxCtx.rotate(this.rot * Math.PI/180);
                fxCtx.fillStyle = this.color; fxCtx.fillRect(-this.size/2, -this.size/2, this.size, this.size*1.5);
                fxCtx.restore();
            }
        }

        function animate() {
            // Fondo estelar
            bgCtx.clearRect(0,0, bgCanvas.width, bgCanvas.height);
            bgCtx.fillStyle = '#d4af37';
            stars.forEach(s => {
                s.y -= s.speed; if(s.y < 0) s.y = bgCanvas.height;
                bgCtx.globalAlpha = Math.random() * 0.5 + 0.2;
                bgCtx.beginPath(); bgCtx.arc(s.x, s.y, s.size, 0, Math.PI*2); bgCtx.fill();
            });

            // Partículas (FX)
            fxCtx.clearRect(0,0, fxCanvas.width, fxCanvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].life <= 0 || particles[i].y > fxCanvas.height + 50) particles.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }
        resize(); animate();

        // --- LÓGICA DEL JUEGO ---
        
        function startExperience() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            bgMusic.volume = 0.3; bgMusic.play(); // Inicia música de fondo
            
            document.getElementById('start-btn').style.display = 'none';
            cake.classList.add('active');
            
            setTimeout(() => {
                title.innerText = "Ilumina la noche"; title.style.opacity = 1;
                hint.innerText = "Desliza tu dedo por la mecha"; hint.style.opacity = 1;
                phase = 0;
            }, 1000);
        }

        // Interacción mágica
        function getPos(e) { return e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY }; }
        
        function handleMove(e) {
            if(phase !== 0) return;
            const pos = getPos(e);
            particles.push(new Spark(pos.x, pos.y), new Spark(pos.x, pos.y));

            const rect = wick.getBoundingClientRect();
            if (pos.x > rect.left - 20 && pos.x < rect.right + 20 && pos.y > rect.top - 20 && pos.y < rect.bottom + 20) {
                lightCandle();
            }
        }
        window.addEventListener('mousemove', handleMove); window.addEventListener('touchmove', handleMove, {passive: false});

        function lightCandle() {
            phase = 1;
            playSpark(); // Sonido de chispa
            flame.classList.add('lit');
            document.body.style.background = 'radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%)';
            
            title.style.opacity = 0; hint.style.opacity = 0;
            setTimeout(() => {
                title.innerText = "Pide un deseo"; title.style.opacity = 1;
                hint.innerText = "Toca la llama 3 veces para soplar"; hint.style.opacity = 1;
            }, 500);
        }

        flame.addEventListener('click', blowCandle);
        flame.addEventListener('touchstart', (e) => { e.preventDefault(); blowCandle(); });

        function blowCandle() {
            if(phase !== 1) return;
            taps++;
            flame.style.transform = `translateX(-50%) scale(${1 - taps*0.2})`;
            
            if(taps >= 3) {
                phase = 2;
                playBlow(); // Sonido de soplar
                flame.classList.remove('lit'); flame.style.display = 'none';
                title.style.opacity = 0; hint.style.opacity = 0;
                document.body.style.background = '#0b0c10'; // Vuelve a oscuro

                // Ocultar pastel, mostrar regalo
                setTimeout(() => {
                    cake.classList.remove('active'); cake.classList.add('hide');
                    setTimeout(() => { gift.classList.add('active'); }, 800);
                }, 1000);
            }
        }

        function openGift() {
            if(phase !== 2) return;
            phase = 3;
            
            playPop(); // Sonido de explosión
            bgMusic.volume = 0.6; // Sube la música

            gift.style.transform = 'translate(-50%, -50%) scale(1.5)';
            gift.style.opacity = 0;
            setTimeout(() => gift.style.display = 'none', 1000);

            // Confeti
            for(let i=0; i<300; i++) particles.push(new Confetti());

            // Mostrar tarjeta
            setTimeout(() => { card.classList.add('show'); }, 500);
        }

        // Efecto 3D Tarjeta
        window.addEventListener('mousemove', (e) => {
            if(phase !== 3) return;
            const pos = getPos(e);
            card.style.transform = `translateY(0) rotateY(${(window.innerWidth/2 - pos.x)/30}deg) rotateX(${(window.innerHeight/2 - pos.y)/30}deg)`;
        });
    </script>
</body>
</html>
